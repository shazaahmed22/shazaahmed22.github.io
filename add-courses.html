<!DOCTYPE html>
<html>
<head>
    <title>Add New Course - Shaza Ahmed</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="COURSES-PAGE"> 
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="courses.html">My Courses</a>
            <a href="add-courses.html">Add Course</a>
            <a href="contact.html">Contact Us</a>
        </nav>

        <div class="main-content">
            <h1>Add New Course</h1>
            
            <div class="form-container">
                <form>
                    <div class="form-group">
                        <label>Course Name:</label>
                        <input type="text" placeholder="e.g. Data Structures">
                    </div>

                    <div class="form-group">
                        <label>Instructor Name:</label>
                        <input type="text" placeholder="Dr. Name">
                    </div>

                    <div class="form-group">
                        <label>Credit Hours:</label>
                        <input type="text" placeholder="NUM">
                    </div>



                    <button type="submit" class="submit-btn">Save Course</button>
                </form>
            </div>
        </div>

        <footer class="main-footer">
            <div class="footer-bottom">
                <p>© All Rights Reserved | Made By <span>Shaza Ahmed</span></p>
            </div>
        </footer>
    </div>
</body>
</html>
